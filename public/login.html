<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – ESP Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
      background: #0f172a; font-family: 'Segoe UI', sans-serif;
    }
    .card {
      background: #1e293b; border: 1px solid #334155;
      border-radius: 16px; padding: 48px 40px;
      width: 100%; max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo h1 { font-size: 22px; font-weight: 700; color: #f1f5f9; }
    .logo p  { font-size: 13px; color: #64748b; margin-top: 4px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 8px; font-weight: 500; }
    input {
      width: 100%; padding: 12px 16px;
      background: #0f172a; border: 1px solid #334155;
      border-radius: 8px; color: #f1f5f9; font-size: 14px; outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #38bdf8; }
    button {
      width: 100%; padding: 13px; background: #38bdf8;
      color: #0f172a; border: none; border-radius: 8px;
      font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px;
      transition: background 0.2s;
    }
    button:hover { background: #7dd3fc; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .error {
      display: none; background: #450a0a; border: 1px solid #b91c1c;
      color: #fca5a5; font-size: 13px; padding: 10px 14px;
      border-radius: 8px; margin-bottom: 16px; text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>🌿 ESP Dashboard</h1>
      <p>Sign in to continue</p>
    </div>
    <div class="error" id="error-msg">Invalid email or password.</div>
    <form id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required />
      </div>
      <button type="submit" id="btn">Sign In</button>
    </form>
  </div>

  <script>
    if (sessionStorage.getItem('auth') === 'true') window.location.href = '/';

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn');
      const err = document.getElementById('error-msg');
      err.style.display = 'none';
      btn.textContent = 'Signing in...';
      btn.disabled = true;

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        if (res.ok) {
          sessionStorage.setItem('auth', 'true');
          window.location.href = '/';
        } else {
          err.style.display = 'block';
          btn.textContent = 'Sign In';
          btn.disabled = false;
        }
      } catch {
        err.textContent = 'Server unreachable. Is it running?';
        err.style.display = 'block';
        btn.textContent = 'Sign In';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
